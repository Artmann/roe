name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # GITHUB_TOKEN-authored pushes don't trigger other workflows, so the
      # tag this creates would never kick off release.yml. RELEASE_PLEASE_TOKEN
      # must be a PAT (or GitHub App token) with repo contents/PR write access.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
